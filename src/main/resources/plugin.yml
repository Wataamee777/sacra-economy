name: SacraEconomy
version: '${project.version}'
main: sc.sacra.economy.SacraEconomyPlugin
api-version: '1.21'
description: '${project.description}'
depend: [Vault]
# 👇 【重要】QualityArmorsがサーバーにある場合、先に読み込んでもらう設定
softdepend: [QualityArmors]
author: Sacra,wataamee777
commands:
  company:
    description: Company creation and deletion commands.
    usage: /company <new|del> <会社名>
  license:
    description: Business license commands.
    usage: /license buy <1-5>
  money:
    description: Economy transfer, ranking, and giveaway commands.
    usage: /money <pay|rank|ranking|history|giveaway>
  quest:
    description: Advancement quest reward commands.
    usage: /quest claim [実績ID]
  shop:
    description: Open the server shop GUI.
    usage: /shop
  trade:
    description: Request a safe player trade.
    usage: /trade <プレイヤー名>
  admin:
    description: SacraEconomy administrator commands.
    usage: /admin <money|company|code|shop>
