name: Maven CI

on:
  push:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  build:
    name: Build with Maven
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[mvn skip]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and package
        run: mvn --batch-mode --update-snapshots clean package

      # pom.xml からバージョン番号を取得して環境変数に格納するステップ
      - name: Extract Maven Project Version
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "PROJECT_VERSION=${VERSION}" >> $GITHUB_ENV

      # 動的なファイル名（バージョンを含む）でビルド成果物をアップロード
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: maven-build-artifacts
          # WARファイルの場合は、末尾の .jar を .war に書き換えてください
          path: target/Sacra*.jar
